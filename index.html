<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Laps Fuse</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* ===== Ideofuzion template — responsive letterbox + loading UI =====
         All overrides live inline here because Unity regenerates TemplateData/style.css
         on every build; !important beats it. */

      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background: #0e0e12;
      }

      /* Full-viewport shell. Solid dark = clean loading backdrop + clean letterbox bars.
         (No hero image: LapsFuse has no dedicated wide hero art, and square game art
         looks oversized stretched into the side bars.) */
      #unity-container {
        position: fixed; inset: 0;
        background: #0e0e12;
      }

      /* Canvas is positioned by JS (letterbox). Must be TRANSPARENT so the hero shows
         through while loading; Unity fills it once the game renders. */
      #unity-canvas {
        display: block; position: absolute;
        background: transparent !important;
      }

      /* ---- Loading bar ---- */
      #unity-loading-bar {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        display: none; z-index: 10; text-align: center;
      }
      #unity-logo {
        width: 180px; height: 180px; margin: 0 auto 12px;
        background: url('TemplateData/game-icon.png') center / contain no-repeat;
      }
      #unity-progress-bar-empty {                 /* track */
        width: 300px; height: 18px; margin: 12px auto 0;
        background: #d9d9d9 !important; background-image: none !important;
        border-radius: 9px; overflow: hidden;
      }
      #unity-progress-bar-full {                  /* fill */
        width: 0%; height: 100%;
        background: #1C3A5B !important; background-image: none !important;
        margin-top: 0 !important;                 /* fix: default style.css pushes it down */
        border-radius: 9px; transition: width 0.1s ease;
      }
      #unity-progress-percent {                   /* % readout */
        color: #F2F2F2; font: 14px arial, sans-serif; margin-top: 6px;
      }

      /* No footer in this build. */
      #unity-footer { display: none !important; }
      #unity-warning {
        position: absolute; left: 50%; top: 5%; transform: translate(-50%);
        background: white; padding: 10px; display: none; z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
        <div id="unity-progress-percent">0%</div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // ===== Responsive letterbox: largest rect of the game's aspect that fits, centered =====
      var GAME_ASPECT = 1080 / 1920;
      function resizeCanvas() {
        var availW = window.innerWidth, availH = window.innerHeight, w, h;
        if (availW / availH > GAME_ASPECT) { h = availH; w = Math.round(h * GAME_ASPECT); }
        else                               { w = availW; h = Math.round(w / GAME_ASPECT); }
        canvas.style.width  = w + "px";
        canvas.style.height = h + "px";
        canvas.style.left   = Math.round((availW - w) / 2) + "px";
        canvas.style.top    = Math.round((availH - h) / 2) + "px";
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      // ===== Single source of truth for the loading bar + percent =====
      function setLoadProgress(p) {
        var pct  = Math.round(p * 100);
        var full = document.querySelector("#unity-progress-bar-full");
        var txt  = document.querySelector("#unity-progress-percent");
        if (full) full.style.width = pct + "%";
        if (txt)  txt.innerText    = pct + "%";
      }

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function () { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Mobaso",
        productName: "Laps Fuse",
        productVersion: "1.3",
        showBanner: unityShowBanner,
        // Render buffer tracks the CSS (letterboxed) canvas size -> responsive, no distortion.
        matchWebGLToCanvasSize: true,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, setLoadProgress).then((unityInstance) => {
          window.unityInstance = unityInstance;

          // Force 100% before hiding (Unity's onProgress plateaus at 0.9).
          setLoadProgress(1);

          // Safari/WebKit keeps painting loading elements even after display:none on a parent.
          // Hide each element explicitly, clear any background image, then REMOVE it from the DOM
          // so nothing can be painted. (Only #unity-logo has a background image — the game icon.)
          function killEl(sel) {
            var el = document.querySelector(sel);
            if (!el) return;
            el.style.display = "none";
            el.style.visibility = "hidden";
            el.style.opacity = "0";
            el.style.backgroundImage = "none";   // kill any background image (the icon)
            if (el.parentNode) el.parentNode.removeChild(el);
          }
          killEl("#unity-logo");
          killEl("#unity-progress-bar-full");
          killEl("#unity-progress-bar-empty");
          killEl("#unity-progress-percent");
          killEl("#unity-loading-bar");
          // No custom loading overlay/cover div in this template — nothing else to kill.

          resizeCanvas();

          // ===== Page <-> game bridge (GameBull) =====
          try { window.parent.postMessage({ type: 'game:ready' }, '*'); } catch (e) {}
          window.addEventListener('message', function (event) {
            var msg = event.data;
            if (!msg || msg.type !== 'campaign:init') return;
            var cfg = msg.config || {};
            if (cfg.ballImage) {
              try { unityInstance.SendMessage('Bridge', 'SetBallImage', cfg.ballImage); } catch (e) {}
            }
          });
          // Self-test: ?ballTest=1 pushes a hot-pink circle as the ball image (needs Bridge.cs).
          if (/[?&]ballTest=1/.test(window.location.search)) {
            var c = document.createElement('canvas'); c.width = c.height = 256;
            var g = c.getContext('2d');
            g.fillStyle = '#ff17a5'; g.beginPath(); g.arc(128, 128, 120, 0, Math.PI * 2); g.fill();
            try { unityInstance.SendMessage('Bridge', 'SetBallImage', c.toDataURL('image/png')); } catch (e) {}
          }
        }).catch((message) => { alert(message); });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
